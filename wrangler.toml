name = "trujillo-reportes-api"
main = "src/index.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# Variables de entorno públicas
# Las SECRETAS se configuran con: wrangler secret put <NOMBRE>
#   - JWT_SECRET
#   - CLOUDINARY_API_KEY
#   - CLOUDINARY_API_SECRET
[vars]
ENVIRONMENT = "development"
FRONTEND_URL = "https://trujillo-reportes.pages.dev"
CLOUDINARY_CLOUD_NAME = "dumeeolat"

# Base de datos D1
[[d1_databases]]
binding = "DB"
database_name = "plataforma-trujillo"
database_id = "71395663-3301-473c-93d0-22d8c9e97d04"